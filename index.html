<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Games</title>
    <style>
        :root {
            --bg: #070b1f;
            --card: #111827;
            --text: #e2e8f0;
            --muted: #94a3b8;
            --accent: #38bdf8;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: radial-gradient(circle at 30% 0%, #1f2937 0%, #020617 55%, #020617 100%);
            color: var(--text);
            font-family: Inter, system-ui, sans-serif;
            padding: 16px;
        }

        .container {
            width: min(95vw, 500px);
            background: linear-gradient(180deg, #111827 0%, #0b1222 100%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 18px;
            box-shadow: 0 24px 50px rgba(0, 0, 0, 0.35);
            padding: 22px;
        }

        h1 {
            margin: 0 0 8px;
            text-align: center;
            font-size: clamp(1.5rem, 5vw, 2.2rem);
        }

        p {
            margin: 0 0 18px;
            color: var(--muted);
            text-align: center;
            font-size: 0.95rem;
        }

        .nav {
            display: grid;
            gap: 10px;
        }

        .nav a {
            text-decoration: none;
        }

        .nav button {
            width: 100%;
            border: 0;
            border-radius: 10px;
            background: linear-gradient(120deg, #0ea5e9, #3b82f6);
            color: white;
            font-size: 1rem;
            padding: 12px;
            cursor: pointer;
            font-weight: 600;
            transition: transform .12s ease, background .12s ease;
        }

        .nav button:hover {
            transform: translateY(-1px);
            background: linear-gradient(120deg, #22d3ee, #60a5fa);
        }

        .top-nav {
            margin-bottom: 14px;
            display: flex;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .top-nav a {
            color: #cbd5e1;
            font-size: .85rem;
            text-decoration: none;
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 7px;
            padding: 5px 9px;
        }

        .top-nav a:hover {
            background: #0ea5e9;
            color: #fff;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>My Games</h1>
        <p>Welcome! Pick one of the games below to launch it.</p>
        <div class="nav">
            <a href="../Frogger/frogger.html"><button>Play Frogger</button></a>
            <a href="../FlappyBird/flappybird.html"><button>Play Flappy Bird</button></a>
            <a href="../CaptainBlaster/captainblaster.html"><button>Play Captain Blaster</button></a>
            <a href="../Platformer/platformer.html"><button>Play Platformer</button></a>
        </div>
    </div>
</body>

</html>
